version: "2"
type: frontend
tech_stack:
  - TypeScript
  - React 19
  - Next.js 16 App Router
  - NextAuth v5 (Auth.js) with Credentials provider
  - Tailwind CSS v4
  - shadcn/ui component library
  - Prisma ORM with SQLite
  - Zod validation
  - swagger-parser for OpenAPI parsing
  - JSZip for zip generation
  - react-syntax-highlighter
  - sonner for toast notifications
  - lucide-react icons
  - JetBrains Mono and DM Sans fonts
routes:
  - path: /
    file: src/app/page.tsx
    auth_required: false
    description: Landing page with product overview and CTAs
  - path: /auth/signin
    file: src/app/auth/signin/page.tsx
    auth_required: false
    description: Sign in page with email and password
  - path: /auth/signup
    file: src/app/auth/signup/page.tsx
    auth_required: false
    description: Sign up page with name, email, password, confirm password
  - path: /dashboard
    file: src/app/(app)/dashboard/page.tsx
    auth_required: true
    description: Project dashboard with cards grid, search, and delete
  - path: /projects/new
    file: src/app/(app)/projects/new/page.tsx
    auth_required: true
    description: Create new project with spec upload, paste, or URL fetch
  - path: /projects/[id]
    file: src/app/(app)/projects/[id]/page.tsx
    auth_required: true
    description: Project detail with endpoint table, config panel, code preview, history
features:
  - name: User Sign In
    description: Sign in with email and password credentials via Auth.js v5
    files:
      - src/app/auth/signin/page.tsx
      - src/lib/auth.ts
    entry_route: /auth/signin
    user_interactions:
      - Fill email input field
      - Fill password input field
      - Click Sign In button to submit
      - See error message on invalid credentials
      - Press Enter key to submit from password field
      - See loading state on button during submission
      - Redirect to dashboard on success
    api_calls:
      - method: POST
        endpoint: /api/auth/callback/credentials
    auth_required: false
  - name: User Sign Up
    description: Register new account with name, email, password, confirm password
    files:
      - src/app/auth/signup/page.tsx
      - src/app/api/auth/signup/route.ts
    entry_route: /auth/signup
    user_interactions:
      - Fill optional name field
      - Fill email field
      - Fill password field with strength requirements
      - Fill confirm password field
      - Click Create Account button
      - See inline validation errors per field
      - See password strength hint
      - Redirect to dashboard on success
    api_calls:
      - method: POST
        endpoint: /api/auth/signup
    auth_required: false
  - name: User Sign Out
    description: Sign out from any authenticated page via navbar dropdown
    files:
      - src/components/navbar.tsx
    entry_route: /dashboard
    user_interactions:
      - Click user avatar in navbar
      - Click Sign out button in dropdown
      - Redirect to sign in page
    api_calls:
      - method: POST
        endpoint: /api/auth/signout
    auth_required: true
  - name: Route Protection
    description: Protected routes redirect to signin, auth pages redirect to dashboard if logged in
    files:
      - proxy.ts
    entry_route: /dashboard
    user_interactions:
      - Access /dashboard without auth redirects to /auth/signin
      - Access /auth/signin while logged in redirects to /dashboard
    api_calls: []
    auth_required: false
  - name: Landing Page
    description: Marketing landing page with hero, app preview mockup, features, steps, and CTAs
    files:
      - src/app/page.tsx
    entry_route: /
    user_interactions:
      - Click Get started button to navigate to signup
      - Click Sign in link to navigate to signin
      - Click GitHub link to open repo
      - View app preview mockup with endpoint table
      - View three-step flow diagram
      - View code output section
      - View feature grid
    api_calls: []
    auth_required: false
  - name: Dashboard Project List
    description: View all projects as cards with search and delete functionality
    files:
      - src/components/dashboard-content.tsx
      - src/app/(app)/dashboard/page.tsx
    entry_route: /dashboard
    user_interactions:
      - View project cards with name, spec title, endpoint count, dates
      - Click a project card to navigate to project detail
      - Click New Project button to navigate to create project
      - Type in search input to filter projects by name
      - See empty state when no projects exist
      - See no results state when search matches nothing
      - Click delete button on project card
      - Confirm delete in AlertDialog
      - See success toast after deletion
      - See loading skeleton while data loads
    api_calls:
      - method: GET
        endpoint: /api/projects
      - method: DELETE
        endpoint: /api/projects/:id
    auth_required: true
  - name: Create Project via File Upload
    description: Upload an OpenAPI spec file via drag-and-drop or file picker
    files:
      - src/app/(app)/projects/new/page.tsx
    entry_route: /projects/new
    user_interactions:
      - Enter project name
      - Click Upload File tab
      - Drag and drop a .json or .yaml file
      - Click browse to select file
      - See filename and size after selection
      - Click remove to clear selected file
      - See error for invalid file types
      - See error for files over 5MB
      - Click Create Project button
      - See loading state during submission
    api_calls:
      - method: POST
        endpoint: /api/projects
    auth_required: true
  - name: Create Project via Paste
    description: Paste OpenAPI spec content as JSON or YAML
    files:
      - src/app/(app)/projects/new/page.tsx
    entry_route: /projects/new
    user_interactions:
      - Enter project name
      - Click Paste Content tab
      - Paste JSON or YAML into textarea
      - See character count update
      - Click Create Project button
      - See error for invalid JSON syntax
      - See error for invalid YAML syntax
      - See error for non-OpenAPI content
      - Redirect to project detail on success
    api_calls:
      - method: POST
        endpoint: /api/projects
    auth_required: true
  - name: Create Project via URL Fetch
    description: Fetch OpenAPI spec from a remote URL using server-side proxy
    files:
      - src/app/(app)/projects/new/page.tsx
      - src/app/api/fetch-spec/route.ts
    entry_route: /projects/new
    user_interactions:
      - Enter project name
      - Click Fetch from URL tab
      - Enter URL in input field
      - Click Fetch button
      - See loading state while fetching
      - See success message and spec preview
      - See error for invalid URL format
      - See error for fetch failure
      - Click Create Project button
    api_calls:
      - method: POST
        endpoint: /api/fetch-spec
      - method: POST
        endpoint: /api/projects
    auth_required: true
  - name: Endpoint Explorer Table
    description: View and interact with endpoint mappings table on project detail page
    files:
      - src/components/project-detail-content.tsx
    entry_route: /projects/[id]
    user_interactions:
      - View endpoint table with method badges, paths, operation IDs, summaries, params, MCP type
      - See summary bar with total endpoints and type counts
      - See loading skeleton while data loads
      - See empty state when no endpoints match filters
    api_calls:
      - method: GET
        endpoint: /api/projects/:id/mappings
    auth_required: true
  - name: Endpoint Search and Filtering
    description: Search and filter endpoints by path, method, and MCP type
    files:
      - src/components/project-detail-content.tsx
    entry_route: /projects/[id]
    user_interactions:
      - Type in search input to filter by path or operationId
      - Select HTTP method filter from dropdown
      - Select MCP type filter from dropdown
      - See combined AND logic filtering
      - Clear search to restore all results
      - Clear method filter by selecting All Methods
      - Clear MCP type filter by selecting All Types
      - See filter resets pagination to page 1
    api_calls:
      - method: GET
        endpoint: /api/projects/:id/mappings
    auth_required: true
  - name: Endpoint Pagination
    description: Navigate between pages of endpoints when more than 20 exist
    files:
      - src/components/project-detail-content.tsx
    entry_route: /projects/[id]
    user_interactions:
      - See pagination controls when more than 20 endpoints
      - Click next page button
      - Click previous page button
      - See current page indicator
      - See total endpoint count
    api_calls:
      - method: GET
        endpoint: /api/projects/:id/mappings
    auth_required: true
  - name: Single MCP Type Change
    description: Change the MCP type of a single endpoint via dropdown
    files:
      - src/components/project-detail-content.tsx
    entry_route: /projects/[id]
    user_interactions:
      - Click MCP type dropdown on an endpoint row
      - Select new type (Tool, Resource, Resource Template, Exclude)
      - See optimistic update in table
      - See loading indicator during save
      - See summary counts refresh after save
      - See error toast and revert on save failure
    api_calls:
      - method: PATCH
        endpoint: /api/projects/:id/mappings/:mappingId
    auth_required: true
  - name: Bulk MCP Type Actions
    description: Select multiple endpoints and change their MCP type at once
    files:
      - src/components/project-detail-content.tsx
    entry_route: /projects/[id]
    user_interactions:
      - Check individual endpoint checkboxes
      - Check select all checkbox in header
      - See bulk action bar appear when rows selected
      - Click Set as Tool, Resource, Template, or Exclude
      - See success toast with count of updated endpoints
      - See bulk action bar disappear after action
    api_calls:
      - method: PATCH
        endpoint: /api/projects/:id/mappings/bulk
    auth_required: true
  - name: Server Config Panel
    description: Configure MCP server transport, auth, name, version, port, and base URL
    files:
      - src/components/server-config-panel.tsx
    entry_route: /projects/[id]
    user_interactions:
      - Select transport radio (stdio, SSE, Streamable HTTP)
      - See port field appear for SSE/HTTP
      - Select auth method dropdown
      - Edit server name
      - Edit server version
      - Edit base URL
      - See auto-save indicator (Saving, Saved, Failed)
      - See validation errors for invalid port
    api_calls:
      - method: GET
        endpoint: /api/projects/:id/config
      - method: PUT
        endpoint: /api/projects/:id/config
    auth_required: true
  - name: Code Preview
    description: View generated MCP server code with syntax highlighting
    files:
      - src/components/code-preview.tsx
    entry_route: /projects/[id]
    user_interactions:
      - Click Preview tab
      - View 5 file tabs (index.ts, package.json, tsconfig.json, .env.example, README.md)
      - Click between file tabs
      - See syntax highlighted code
      - See file size next to tab name
      - Click copy button to copy file content
      - See copied confirmation
    api_calls:
      - method: POST
        endpoint: /api/projects/:id/generate
    auth_required: true
  - name: Download Project
    description: Download generated MCP server as a zip file
    files:
      - src/components/download-button.tsx
    entry_route: /projects/[id]
    user_interactions:
      - Click Download button
      - See loading state with Generating text
      - Browser downloads zip file
      - See success toast
    api_calls:
      - method: POST
        endpoint: /api/projects/:id/generate
      - method: GET
        endpoint: /api/projects/:id/download
    auth_required: true
  - name: Version History
    description: View history of generated versions with expandable snapshots
    files:
      - src/components/version-history.tsx
    entry_route: /projects/[id]
    user_interactions:
      - Click History tab
      - See list of versions with number, timestamp, summary
      - Click version to expand and see config snapshot
      - Click again to collapse
      - See empty state when no versions exist
    api_calls:
      - method: GET
        endpoint: /api/projects/:id/versions
    auth_required: true
  - name: Inline Project Name Edit
    description: Edit project name inline on the project detail page
    files:
      - src/components/project-detail-content.tsx
    entry_route: /projects/[id]
    user_interactions:
      - Click pencil icon next to project name
      - Edit name in input field
      - Press Enter to save
      - Press Escape to cancel
      - See loading state during save
      - See updated name after save
    api_calls:
      - method: PATCH
        endpoint: /api/projects/:id
    auth_required: true
  - name: Navbar
    description: Navigation bar with logo, dashboard link, and user menu
    files:
      - src/components/navbar.tsx
    entry_route: /dashboard
    user_interactions:
      - Click MCPForge logo to go to dashboard
      - Click Dashboard link
      - Click user avatar to open dropdown
      - See user name and email in dropdown
      - Click Sign out in dropdown
    api_calls: []
    auth_required: true
known_limitations:
  - issue: Forgot password link on signin page is a dead link
    location: src/app/auth/signin/page.tsx
    impact: Users cannot recover forgotten passwords
  - issue: GitHub OAuth button is commented out
    location: src/app/auth/signin/page.tsx
    impact: Only email/password auth available
