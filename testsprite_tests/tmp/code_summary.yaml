version: "2"
type: frontend
tech_stack:
  - TypeScript
  - React 19
  - Next.js 16 (App Router)
  - NextAuth v5 (beta) with Credentials provider
  - Prisma ORM with SQLite
  - Tailwind CSS 4
  - shadcn/ui (Base UI components)
  - Zod validation
  - Sonner toast notifications
  - react-syntax-highlighter
  - JSZip (zip generation)
  - bcryptjs (password hashing)
  - swagger-parser (OpenAPI parsing)
  - lucide-react icons
routes:
  - path: /
    file: src/app/page.tsx
    auth_required: false
    description: Landing page with hero section, three-step flow, code output preview, features grid, and CTA
  - path: /auth/signin
    file: src/app/auth/signin/page.tsx
    auth_required: false
    description: Sign in page with email and password credentials form
  - path: /auth/signup
    file: src/app/auth/signup/page.tsx
    auth_required: false
    description: Sign up page with name, email, password, and confirm password form with client-side validation
  - path: /dashboard
    file: src/app/(app)/dashboard/page.tsx
    auth_required: true
    description: Dashboard listing all user projects as cards with search, delete, and create new project actions
  - path: /projects/new
    file: src/app/(app)/projects/new/page.tsx
    auth_required: true
    description: Create new project page with three input tabs for OpenAPI spec (upload file, paste content, fetch from URL)
  - path: /projects/[id]
    file: src/app/(app)/projects/[id]/page.tsx
    auth_required: true
    description: Project detail page with endpoint explorer table, server config panel, code preview, and version history tabs
  - path: /api/auth/[...nextauth]
    file: src/app/api/auth/[...nextauth]/route.ts
    auth_required: false
    description: NextAuth API route handler for session management and credential-based authentication
  - path: /api/auth/signup
    file: src/app/api/auth/signup/route.ts
    auth_required: false
    description: POST endpoint for user registration with email/password validation and bcrypt hashing
  - path: /api/projects
    file: src/app/api/projects/route.ts
    auth_required: true
    description: GET lists all user projects; POST creates a new project by parsing an OpenAPI spec and creating mappings and config
  - path: /api/projects/[id]
    file: src/app/api/projects/[id]/route.ts
    auth_required: true
    description: GET returns single project with mappings and config; PATCH updates project name; DELETE removes project
  - path: /api/projects/[id]/mappings
    file: src/app/api/projects/[id]/mappings/route.ts
    auth_required: true
    description: GET returns paginated endpoint mappings with search, method, and mcpType filtering
  - path: /api/projects/[id]/mappings/[mappingId]
    file: src/app/api/projects/[id]/mappings/[mappingId]/route.ts
    auth_required: true
    description: PATCH updates a single endpoint mapping mcpType (tool, resource, resource_template, exclude)
  - path: /api/projects/[id]/mappings/bulk
    file: src/app/api/projects/[id]/mappings/bulk/route.ts
    auth_required: true
    description: PATCH bulk updates mcpType for multiple selected endpoint mappings
  - path: /api/projects/[id]/config
    file: src/app/api/projects/[id]/config/route.ts
    auth_required: true
    description: GET returns server config; PUT updates server config (transport, auth, name, version, baseUrl, port)
  - path: /api/projects/[id]/generate
    file: src/app/api/projects/[id]/generate/route.ts
    auth_required: true
    description: POST generates MCP server code files from mappings and config, creates a version snapshot
  - path: /api/projects/[id]/download
    file: src/app/api/projects/[id]/download/route.ts
    auth_required: true
    description: GET generates and returns a zip file of the complete MCP server project
  - path: /api/projects/[id]/versions
    file: src/app/api/projects/[id]/versions/route.ts
    auth_required: true
    description: GET lists all version snapshots for a project ordered by most recent
features:
  - name: User Sign Up
    description: Register a new account with name (optional), email, password, and confirm password. Client-side validation enforces minimum 8 characters, 1 uppercase, 1 number. Auto-signs in after successful registration.
    files:
      - src/app/auth/signup/page.tsx
      - src/app/api/auth/signup/route.ts
      - src/lib/auth.ts
    entry_route: /auth/signup
    user_interactions:
      - Navigate to /auth/signup or click "Get started" / "Sign up" link
      - Optionally enter full name
      - Enter email address
      - Enter password (min 8 chars, 1 uppercase, 1 number)
      - Enter confirm password
      - Click "Create Account" button
      - See validation errors inline if any field is invalid
      - On success, automatically signed in and redirected to /dashboard
    api_calls:
      - method: POST
        endpoint: /api/auth/signup
      - method: POST
        endpoint: /api/auth/[...nextauth] (signIn credentials)
    auth_required: false
  - name: User Sign In
    description: Authenticate with email and password using NextAuth credentials provider. JWT session strategy.
    files:
      - src/app/auth/signin/page.tsx
      - src/lib/auth.ts
      - src/app/api/auth/[...nextauth]/route.ts
    entry_route: /auth/signin
    user_interactions:
      - Navigate to /auth/signin or click "Sign in" link
      - Enter email address
      - Enter password
      - Click "Sign In" button
      - See error message if credentials are invalid
      - On success, redirected to /dashboard
    api_calls:
      - method: POST
        endpoint: /api/auth/[...nextauth] (signIn credentials)
    auth_required: false
  - name: User Sign Out (Logout)
    description: Sign out via the navbar dropdown menu. Uses NextAuth signOut server action and redirects to sign in page.
    files:
      - src/components/navbar.tsx
      - src/lib/auth.ts
    entry_route: /dashboard
    user_interactions:
      - Click avatar/user dropdown in the top-right navbar
      - Click "Sign out" button in dropdown menu
      - Redirected to /auth/signin
    api_calls:
      - method: POST
        endpoint: /api/auth/[...nextauth] (signOut)
    auth_required: true
  - name: Dashboard (Project List)
    description: View all projects as a grid of cards showing project name, spec title, endpoint count, and last updated time. Includes loading skeleton states and empty state.
    files:
      - src/app/(app)/dashboard/page.tsx
      - src/components/dashboard-content.tsx
    entry_route: /dashboard
    user_interactions:
      - View project cards in a responsive grid (1-3 columns)
      - See project name, spec title, endpoint count, and relative update time on each card
      - Click a project card to navigate to /projects/[id]
      - Click "New Project" button to navigate to /projects/new
    api_calls:
      - method: GET
        endpoint: /api/projects
    auth_required: true
  - name: Search Projects
    description: Filter projects on the dashboard by name or spec title with debounced client-side search (300ms debounce).
    files:
      - src/components/dashboard-content.tsx
    entry_route: /dashboard
    user_interactions:
      - Type a search query in the "Search projects..." input field
      - See project cards filtered in real time (client-side)
      - See "No results" empty state if no projects match
    api_calls: []
    auth_required: true
  - name: Delete Project
    description: Delete a project from the dashboard with a confirmation dialog. Removes project and all associated mappings, config, and versions via cascade.
    files:
      - src/components/dashboard-content.tsx
      - src/app/api/projects/[id]/route.ts
    entry_route: /dashboard
    user_interactions:
      - Hover over a project card to reveal the trash icon button
      - Click the trash icon to open confirmation dialog
      - Read the warning that deletion is permanent and includes all mappings and configs
      - Click "Cancel" to dismiss or "Delete" to confirm
      - See toast notification on success or failure
      - Project card removed from grid on success
    api_calls:
      - method: DELETE
        endpoint: /api/projects/[id]
    auth_required: true
  - name: Create Project - Upload File Tab
    description: Create a new project by uploading a .json, .yaml, or .yml OpenAPI spec file via drag-and-drop or file picker. Max 5MB.
    files:
      - src/app/(app)/projects/new/page.tsx
      - src/app/api/projects/route.ts
      - src/lib/openapi-parser.ts
    entry_route: /projects/new
    user_interactions:
      - Enter a project name in the "Project Name" field
      - Select the "Upload File" tab (default)
      - Drag and drop a file onto the drop zone, or click to open file picker
      - See selected file name and size displayed
      - Click the X button to remove file and select a different one
      - See validation errors for wrong file type or size exceeding 5MB
      - Click "Create Project" button
      - On success, see toast and redirect to /projects/[id]
    api_calls:
      - method: POST
        endpoint: /api/projects
    auth_required: true
  - name: Create Project - Paste Content Tab
    description: Create a new project by pasting raw OpenAPI JSON or YAML content into a textarea.
    files:
      - src/app/(app)/projects/new/page.tsx
      - src/app/api/projects/route.ts
      - src/lib/openapi-parser.ts
    entry_route: /projects/new
    user_interactions:
      - Enter a project name in the "Project Name" field
      - Click the "Paste Content" tab
      - Paste OpenAPI spec content (JSON or YAML) into the textarea
      - See character count displayed below textarea
      - Click "Create Project" button
      - On success, see toast and redirect to /projects/[id]
    api_calls:
      - method: POST
        endpoint: /api/projects
    auth_required: true
  - name: Create Project - Fetch from URL Tab
    description: Create a new project by fetching an OpenAPI spec from a remote URL with 10-second timeout.
    files:
      - src/app/(app)/projects/new/page.tsx
      - src/app/api/projects/route.ts
      - src/lib/openapi-parser.ts
    entry_route: /projects/new
    user_interactions:
      - Enter a project name in the "Project Name" field
      - Click the "Fetch from URL" tab
      - Enter the URL of an OpenAPI spec
      - Click the "Fetch" button
      - See loading spinner while fetching
      - See "Spec fetched successfully" message with preview of first 2000 characters
      - See error if URL is invalid, request fails, or times out after 10 seconds
      - Click "Create Project" button
      - On success, see toast and redirect to /projects/[id]
    api_calls:
      - method: POST
        endpoint: /api/projects
    auth_required: true
  - name: Endpoint Explorer Table
    description: Interactive table showing all parsed API endpoints with method badges, path, operation ID, summary, param count, and MCP type dropdown. Supports search, filtering, selection, and pagination.
    files:
      - src/components/project-detail-content.tsx
      - src/app/api/projects/[id]/mappings/route.ts
    entry_route: /projects/[id]
    user_interactions:
      - View summary bar showing total endpoints, tools, resources, templates, and excluded counts
      - See table with columns for checkbox, method badge (color-coded), path, operation ID, summary, params count, and MCP type dropdown
      - Scroll horizontally on smaller screens
      - View loading skeleton while data loads
      - See empty state when no endpoints match filters
    api_calls:
      - method: GET
        endpoint: /api/projects/[id]/mappings?search=&method=&mcpType=&page=1&limit=20
    auth_required: true
  - name: Endpoint Search and Filters
    description: Filter endpoint table by search query (path or operation ID), HTTP method dropdown, and MCP type dropdown. Search is debounced at 300ms.
    files:
      - src/components/project-detail-content.tsx
      - src/app/api/projects/[id]/mappings/route.ts
    entry_route: /projects/[id]
    user_interactions:
      - Type in the "Search by path or operation..." input
      - Select an HTTP method from the "All Methods" dropdown (GET, POST, PUT, PATCH, DELETE)
      - Select an MCP type from the "All Types" dropdown (Tool, Resource, Resource Template, Exclude)
      - Filters apply in real time; page resets to 1 on filter change
      - Clear filters by selecting "All Methods" or "All Types"
    api_calls:
      - method: GET
        endpoint: /api/projects/[id]/mappings?search=&method=&mcpType=&page=1&limit=20
    auth_required: true
  - name: Endpoint MCP Type Change (Single)
    description: Change the MCP type of a single endpoint mapping via an inline dropdown with optimistic UI update.
    files:
      - src/components/project-detail-content.tsx
      - src/app/api/projects/[id]/mappings/[mappingId]/route.ts
    entry_route: /projects/[id]
    user_interactions:
      - Click the MCP type dropdown on any endpoint row
      - Select a new type (Tool, Resource, Resource Template, or Exclude)
      - See optimistic update immediately in the table
      - See spinner icon while saving
      - Summary counts refresh after save
      - See error toast and revert on failure
    api_calls:
      - method: PATCH
        endpoint: /api/projects/[id]/mappings/[mappingId]
    auth_required: true
  - name: Endpoint Bulk Actions
    description: Select multiple endpoints via checkboxes and change their MCP type in bulk. Supports select-all on current page.
    files:
      - src/components/project-detail-content.tsx
      - src/app/api/projects/[id]/mappings/bulk/route.ts
    entry_route: /projects/[id]
    user_interactions:
      - Click individual row checkboxes to select endpoints
      - Click the header checkbox to select/deselect all on current page (supports indeterminate state)
      - See bulk action bar appear showing count of selected items
      - Click "Set as Tool", "Set as Resource", "Set as Template", or "Exclude" button
      - See loading spinner during bulk update
      - See success toast with count of updated endpoints
      - Selection clears and table refreshes after bulk update
    api_calls:
      - method: PATCH
        endpoint: /api/projects/[id]/mappings/bulk
    auth_required: true
  - name: Endpoint Pagination
    description: Navigate through pages of endpoints when total exceeds 20 per page. Shows page info and previous/next controls.
    files:
      - src/components/project-detail-content.tsx
      - src/app/api/projects/[id]/mappings/route.ts
    entry_route: /projects/[id]
    user_interactions:
      - See "Showing X-Y of Z endpoints" text and "Page N of M" indicator
      - Click previous page button (disabled on first page)
      - Click next page button (disabled on last page)
      - Page changes trigger new API call with updated page parameter
    api_calls:
      - method: GET
        endpoint: /api/projects/[id]/mappings?page=N&limit=20
    auth_required: true
  - name: Server Config Panel
    description: Side panel on the project detail Endpoints tab for configuring generated MCP server settings. Auto-saves with 500ms debounce.
    files:
      - src/components/server-config-panel.tsx
      - src/app/api/projects/[id]/config/route.ts
    entry_route: /projects/[id]
    user_interactions:
      - View config panel on the right side of the Endpoints tab
      - Select transport type via radio buttons (stdio, SSE, Streamable HTTP)
      - See port number field appear when SSE or Streamable HTTP is selected
      - Enter port number (1024-65535)
      - Select auth method from dropdown (None, API Key, Bearer Token, Basic Auth)
      - See note about .env credentials when auth is not "none"
      - Edit server name (max 50 chars)
      - Edit server version (semver x.y.z)
      - Edit base URL
      - See "Saving...", "Saved", or "Failed to save" status indicator
      - All changes auto-save with 500ms debounce
      - See field-level validation errors from server
    api_calls:
      - method: GET
        endpoint: /api/projects/[id]/config
      - method: PUT
        endpoint: /api/projects/[id]/config
    auth_required: true
  - name: Code Preview
    description: View generated MCP server code across five file tabs (index.ts, package.json, tsconfig.json, .env.example, README.md) with syntax highlighting, line numbers, file sizes, and copy-to-clipboard.
    files:
      - src/components/code-preview.tsx
      - src/app/api/projects/[id]/generate/route.ts
      - src/lib/code-generator.ts
    entry_route: /projects/[id]
    user_interactions:
      - Click the "Preview" tab on the project detail page
      - See generated code auto-load with loading skeleton
      - Switch between file tabs (index.ts, package.json, tsconfig.json, .env.example, README.md)
      - See file size in each tab header
      - View syntax-highlighted code with line numbers
      - Click the copy icon button to copy file content to clipboard
      - See checkmark icon after successful copy
      - See error message if generation fails
    api_calls:
      - method: POST
        endpoint: /api/projects/[id]/generate
    auth_required: true
  - name: Download Project
    description: Generate and download the complete MCP server project as a zip file. Triggers code generation, creates a version snapshot, then downloads the zip.
    files:
      - src/components/download-button.tsx
      - src/app/api/projects/[id]/generate/route.ts
      - src/app/api/projects/[id]/download/route.ts
      - src/lib/code-generator.ts
      - src/lib/zip-builder.ts
    entry_route: /projects/[id]
    user_interactions:
      - Click the "Download" button in the project detail header
      - See button change to "Generating..." with spinner
      - Browser automatically downloads mcpforge-[project-name].zip file
      - See toast notification "Project downloaded" on success
      - See error toast if generation or download fails
    api_calls:
      - method: POST
        endpoint: /api/projects/[id]/generate
      - method: GET
        endpoint: /api/projects/[id]/download
    auth_required: true
  - name: Version History
    description: View all generated version snapshots of a project. Each version shows version number, config summary (tools, resources, transport), and timestamp. Expandable to show detailed configuration snapshot.
    files:
      - src/components/version-history.tsx
      - src/app/api/projects/[id]/versions/route.ts
    entry_route: /projects/[id]
    user_interactions:
      - Click the "History" tab on the project detail page
      - See list of versions ordered by most recent, each showing version number, summary, and date
      - See empty state message if no versions exist yet
      - Click a version row to expand/collapse detailed snapshot view
      - View transport, tool count, resource count, and file count in expanded view
    api_calls:
      - method: GET
        endpoint: /api/projects/[id]/versions
    auth_required: true
  - name: Inline Project Name Editing
    description: Edit the project name directly on the project detail page header via inline input with Enter to save and Escape to cancel.
    files:
      - src/components/project-detail-content.tsx
      - src/app/api/projects/[id]/route.ts
    entry_route: /projects/[id]
    user_interactions:
      - Click the pencil icon next to the project name
      - See inline input field replace the name text, auto-focused and pre-selected
      - Edit the project name
      - Press Enter or click the check icon to save
      - Press Escape or click the X icon to cancel
      - See loading spinner on check icon while saving
      - See toast notification on success or failure
      - Name reverts if save fails
    api_calls:
      - method: PATCH
        endpoint: /api/projects/[id]
    auth_required: true
  - name: Landing Page
    description: Public marketing landing page showcasing MCPForge with hero section, three-step workflow explanation, production-ready output preview, features grid (8 feature cards), and bottom CTA. Includes navigation links to sign in and sign up.
    files:
      - src/app/page.tsx
      - src/components/forge-hammer.tsx
    entry_route: /
    user_interactions:
      - View hero section with tagline and call-to-action buttons
      - Click "Start Building - Free" to navigate to /auth/signup
      - Click "View Documentation" link
      - Click "Sign in" in the nav bar to go to /auth/signin
      - Click "Get started" in the nav bar to go to /auth/signup
      - Click GitHub icon to open GitHub repository
      - Scroll through three-step flow, code output section, and features grid
      - Click "Get started free" in bottom CTA to go to /auth/signup
    api_calls: []
    auth_required: false
  - name: Navbar with User Menu
    description: Persistent navigation bar shown on authenticated pages with logo link, Dashboard link, and user avatar dropdown menu showing name, email, and sign-out action.
    files:
      - src/components/navbar.tsx
      - src/lib/auth.ts
    entry_route: /dashboard
    user_interactions:
      - Click MCPForge logo to go to /dashboard (or / if not signed in)
      - Click "Dashboard" link to go to /dashboard
      - Click avatar/name to open dropdown menu
      - View name and email in dropdown
      - Click "Sign out" to log out
    api_calls: []
    auth_required: true
known_limitations:
  - issue: Forgot password link is non-functional (points to #)
    location: src/app/auth/signin/page.tsx
    impact: Users cannot recover forgotten passwords
  - issue: GitHub OAuth sign-in is commented out
    location: src/app/auth/signin/page.tsx
    impact: Only email/password authentication is available
  - issue: SQLite database used in production
    location: prisma/schema.prisma
    impact: Not suitable for multi-instance deployment or high concurrency
  - issue: URL fetch for OpenAPI spec happens client-side without CORS proxy
    location: src/app/(app)/projects/new/page.tsx
    impact: Many API spec URLs will fail due to CORS restrictions in the browser
  - issue: No email verification on signup
    location: src/app/api/auth/signup/route.ts
    impact: Any email address can be used without verification
  - issue: Version history shows snapshots but does not support restoring to a previous version
    location: src/components/version-history.tsx
    impact: Version history is read-only; users cannot rollback to earlier configurations
