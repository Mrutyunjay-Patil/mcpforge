version: "2"
type: backend
tech_stack:
  - TypeScript
  - Next.js 16 App Router API Routes
  - Prisma ORM with SQLite
  - NextAuth v5 with Credentials provider and JWT sessions
  - Zod schema validation
  - bcryptjs password hashing
  - JSZip zip archive generation
  - swagger-parser for OpenAPI spec parsing
features:
  - name: User Registration API
    description: Register new users with email, password, and optional name. Validates input, checks for duplicate emails, hashes passwords with bcrypt.
    files:
      - src/app/api/auth/signup/route.ts
    endpoints:
      - method: POST
        path: /api/auth/signup
        description: Create a new user account
        auth_required: false
        request_schema:
          body:
            email: string (required, valid email format)
            password: string (required, min 8 chars, 1 uppercase, 1 number)
            name: string (optional)
        response_schema:
          "201": "{ user: { id, email, name } }"
          "400": "{ errors: { email?: string, password?: string } }"
          "409": "{ errors: { email: 'An account with this email already exists' } }"
          "500": "{ errors: { server: 'An unexpected error occurred' } }"
    depends_on: []

  - name: Projects List API
    description: List all projects for the authenticated user, ordered by most recently updated.
    files:
      - src/app/api/projects/route.ts
    endpoints:
      - method: GET
        path: /api/projects
        description: List all projects for the authenticated user
        auth_required: true
        response_schema:
          "200": "{ projects: [{ id, name, specTitle, pathCount, createdAt, updatedAt }] }"
          "401": "{ error: 'Unauthorized' }"
          "500": "{ error: 'Internal server error' }"
    depends_on:
      - User Registration API

  - name: Project Creation API
    description: Create a new project by parsing an OpenAPI spec. Creates the project, endpoint mappings, and default server config in a transaction.
    files:
      - src/app/api/projects/route.ts
      - src/lib/openapi-parser.ts
    endpoints:
      - method: POST
        path: /api/projects
        description: Create a new project from an OpenAPI specification
        auth_required: true
        request_schema:
          body:
            name: string (required, 1-100 chars)
            specContent: string (required, valid OpenAPI JSON or YAML)
            specFormat: string (optional, json or yaml)
        response_schema:
          "201": "{ project: { id, name, pathCount } }"
          "400": "{ error: 'Project name is required' } or { error: 'Spec content is required' } or { error: 'Invalid specification details' }"
          "401": "{ error: 'Unauthorized' }"
          "500": "{ error: 'Internal server error' }"
    depends_on:
      - User Registration API

  - name: Project Detail API
    description: Get, update, or delete a specific project. Enforces ownership - returns 403 if the project belongs to another user.
    files:
      - src/app/api/projects/[id]/route.ts
    endpoints:
      - method: GET
        path: /api/projects/:id
        description: Get a project with its mappings and config
        auth_required: true
        response_schema:
          "200": "{ project: { id, name, specContent, mappings: [...], config: {...} } }"
          "401": "{ error: 'Unauthorized' }"
          "403": "{ error: 'Forbidden' }"
          "404": "{ error: 'Project not found' }"
          "500": "{ error: 'Internal server error' }"
      - method: PATCH
        path: /api/projects/:id
        description: Update project name
        auth_required: true
        request_schema:
          body:
            name: string (required, 1-100 chars)
        response_schema:
          "200": "{ project: { id, name, updatedAt } }"
          "400": "{ error: 'validation error message' }"
          "401": "{ error: 'Unauthorized' }"
          "403": "{ error: 'Forbidden' }"
          "404": "{ error: 'Project not found' }"
          "500": "{ error: 'Internal server error' }"
      - method: DELETE
        path: /api/projects/:id
        description: Delete a project and all related data
        auth_required: true
        response_schema:
          "200": "{ message: 'Project deleted' }"
          "401": "{ error: 'Unauthorized' }"
          "403": "{ error: 'Forbidden' }"
          "404": "{ error: 'Project not found' }"
          "500": "{ error: 'Internal server error' }"
    depends_on:
      - Project Creation API

  - name: Endpoint Mappings API
    description: List endpoint mappings with filtering and pagination. Supports search by path or operationId, filter by HTTP method or MCP type.
    files:
      - src/app/api/projects/[id]/mappings/route.ts
    endpoints:
      - method: GET
        path: /api/projects/:id/mappings
        description: List endpoint mappings with optional filters and pagination
        auth_required: true
        request_schema:
          query:
            search: string (optional, search by path or operationId)
            method: string (optional, filter by HTTP method like GET POST PUT DELETE)
            mcpType: string (optional, filter by tool resource resource_template exclude)
            page: integer (optional, default 1)
            limit: integer (optional, default 20, max 100)
        response_schema:
          "200": "{ mappings: [...], total, page, totalPages, toolCount, resourceCount, templateCount, excludeCount }"
          "401": "{ error: 'Unauthorized' }"
          "403": "{ error: 'Forbidden' }"
          "404": "{ error: 'Project not found' }"
          "500": "{ error: 'Internal server error' }"
    depends_on:
      - Project Creation API

  - name: Single Mapping Update API
    description: Update the MCP type of a single endpoint mapping. Returns 400 if the type is unchanged or invalid.
    files:
      - src/app/api/projects/[id]/mappings/[mappingId]/route.ts
    endpoints:
      - method: PATCH
        path: /api/projects/:id/mappings/:mappingId
        description: Update MCP type for a single endpoint mapping
        auth_required: true
        request_schema:
          body:
            mcpType: string (required, one of tool resource resource_template exclude)
        response_schema:
          "200": "{ mapping: { id, method, path, mcpType, ... } }"
          "400": "{ error: 'Invalid MCP type' } or { error: 'MCP type is already set to this value' }"
          "401": "{ error: 'Unauthorized' }"
          "403": "{ error: 'Forbidden' }"
          "404": "{ error: 'Project not found' } or { error: 'Mapping not found' }"
          "500": "{ error: 'Internal server error' }"
    depends_on:
      - Project Creation API

  - name: Bulk Mapping Update API
    description: Update MCP type for multiple endpoint mappings at once.
    files:
      - src/app/api/projects/[id]/mappings/bulk/route.ts
    endpoints:
      - method: PATCH
        path: /api/projects/:id/mappings/bulk
        description: Bulk update MCP type for selected endpoint mappings
        auth_required: true
        request_schema:
          body:
            mappingIds: array of strings (required, non-empty)
            mcpType: string (required, one of tool resource resource_template exclude)
        response_schema:
          "200": "{ updated: number }"
          "400": "{ error: 'No mappings selected' } or { error: 'Invalid MCP type' }"
          "401": "{ error: 'Unauthorized' }"
          "403": "{ error: 'Forbidden' }"
          "404": "{ error: 'Project not found' }"
          "500": "{ error: 'Internal server error' }"
    depends_on:
      - Project Creation API

  - name: Server Config API
    description: Get and update server configuration for a project. Validates port range 1024-65535, semver format for version, and transport type.
    files:
      - src/app/api/projects/[id]/config/route.ts
      - src/lib/validators.ts
    endpoints:
      - method: GET
        path: /api/projects/:id/config
        description: Get server configuration for a project
        auth_required: true
        response_schema:
          "200": "{ config: { transport, authMethod, serverName, serverVersion, baseUrl, port } }"
          "401": "{ error: 'Unauthorized' }"
          "403": "{ error: 'Access denied' }"
          "404": "{ error: 'Project not found' } or { error: 'Config not found' }"
          "500": "{ error: 'Internal server error' }"
      - method: PUT
        path: /api/projects/:id/config
        description: Update server configuration with validation
        auth_required: true
        request_schema:
          body:
            transport: string (required, one of stdio sse streamable-http)
            authMethod: string (required, one of none api-key bearer basic)
            serverName: string (required, max 50 chars)
            serverVersion: string (required, semver format x.y.z)
            baseUrl: string (optional)
            port: integer (required, 1024-65535)
        response_schema:
          "200": "{ config: { transport, authMethod, serverName, serverVersion, baseUrl, port } }"
          "400": "{ error: 'Validation failed', fieldErrors: { port: ['...'], ... } }"
          "401": "{ error: 'Unauthorized' }"
          "403": "{ error: 'Access denied' }"
          "404": "{ error: 'Project not found' }"
          "500": "{ error: 'Internal server error' }"
    depends_on:
      - Project Creation API

  - name: Code Generation and Download API
    description: Generate MCP server files from project mappings and config. Creates a version snapshot. Download as zip.
    files:
      - src/app/api/projects/[id]/generate/route.ts
      - src/app/api/projects/[id]/download/route.ts
      - src/lib/code-generator.ts
      - src/lib/zip-builder.ts
    endpoints:
      - method: POST
        path: /api/projects/:id/generate
        description: Generate MCP server code and create a version snapshot
        auth_required: true
        response_schema:
          "200": "{ version: { id, versionNumber, createdAt }, files: { 'src/index.ts': '...', 'package.json': '...', ... } }"
          "401": "{ error: 'Unauthorized' }"
          "403": "{ error: 'Access denied' }"
          "404": "{ error: 'Project not found' }"
          "500": "{ error: 'Internal server error' }"
      - method: GET
        path: /api/projects/:id/download
        description: Download generated project as a zip file
        auth_required: true
        response_schema:
          "200": "Binary zip file with Content-Type application/zip"
          "401": "{ error: 'Unauthorized' }"
          "403": "{ error: 'Access denied' }"
          "404": "{ error: 'Project not found' }"
          "500": "{ error: 'Internal server error' }"
    depends_on:
      - Project Creation API
      - Server Config API

  - name: Version History API
    description: List all version snapshots for a project, ordered by most recent first.
    files:
      - src/app/api/projects/[id]/versions/route.ts
    endpoints:
      - method: GET
        path: /api/projects/:id/versions
        description: List version history for a project
        auth_required: true
        response_schema:
          "200": "{ versions: [{ id, versionNumber, configSnapshot, createdAt }] }"
          "401": "{ error: 'Unauthorized' }"
          "403": "{ error: 'Access denied' }"
          "404": "{ error: 'Project not found' }"
          "500": "{ error: 'Internal server error' }"
    depends_on:
      - Code Generation and Download API

known_limitations:
  - issue: Fetch spec proxy has no authentication and could be used for SSRF
    location: src/app/api/fetch-spec/route.ts
    impact: Unauthenticated users can make the server fetch arbitrary URLs
  - issue: No rate limiting on any API endpoints
    location: All API routes
    impact: Vulnerable to brute force and denial of service
