version: "2"
type: backend
tech_stack:
  - TypeScript
  - Next.js 16 (App Router API Routes)
  - Prisma ORM with SQLite
  - NextAuth v5 (beta) with Credentials provider and JWT strategy
  - Zod schema validation
  - bcryptjs for password hashing
  - JSZip for zip archive generation
  - swagger-parser for OpenAPI spec parsing
features:
  - name: Authentication API
    description: User registration endpoint with email/password validation, duplicate email checking, and bcrypt password hashing. Returns created user on success.
    files:
      - src/app/api/auth/signup/route.ts
    endpoints:
      - method: POST
        path: /api/auth/signup
        description: Register a new user account with email, password, and optional name. Validates email format, password strength (min 8 chars, 1 uppercase, 1 number), checks for duplicate emails, hashes password with bcrypt (12 rounds), and creates user in database.
        auth_required: false
        request_schema:
          body:
            email: "string (required, valid email format)"
            password: "string (required, min 8 chars, must contain 1 uppercase letter and 1 number)"
            name: "string (optional, trimmed)"
        response_schema:
          "201": "User created successfully. Returns { user: { id: string, email: string, name: string | null } }"
          "400": "Validation errors. Returns { errors: { email?: string, password?: string } } - missing fields, invalid email format, weak password"
          "409": "Duplicate email. Returns { errors: { email: 'An account with this email already exists' } }"
          "500": "Unexpected server error. Returns { errors: { server: 'An unexpected error occurred' } }"
    depends_on: []

  - name: Auth Session
    description: NextAuth.js v5 catch-all route handlers for credential-based authentication, session management, CSRF protection, and sign-out. Uses JWT session strategy with Credentials provider.
    files:
      - src/app/api/auth/[...nextauth]/route.ts
    endpoints:
      - method: GET
        path: /api/auth/[...nextauth]
        description: "NextAuth GET handler serving multiple sub-routes: /api/auth/session (get current session), /api/auth/csrf (get CSRF token), /api/auth/providers (list auth providers), /api/auth/signout (sign-out page)"
        auth_required: false
        request_schema: {}
        response_schema:
          "200": "Session data, CSRF token, provider list, or sign-out confirmation depending on sub-route"
      - method: POST
        path: /api/auth/[...nextauth]
        description: "NextAuth POST handler for sub-routes: /api/auth/callback/credentials (sign in with email+password), /api/auth/signout (execute sign-out)"
        auth_required: false
        request_schema:
          body:
            email: "string (for credentials callback)"
            password: "string (for credentials callback)"
        response_schema:
          "200": "Successful authentication with session cookie set, or successful sign-out"
          "401": "Invalid credentials"
    depends_on:
      - Authentication API

  - name: Projects CRUD
    description: Full CRUD operations for managing MCP server projects. Create parses an OpenAPI spec and auto-generates endpoint mappings and server config in a single database transaction. List returns all user projects. Detail includes mappings and config. Rename validates with Zod. Delete cascades to all related data.
    files:
      - src/app/api/projects/route.ts
      - src/app/api/projects/[id]/route.ts
    endpoints:
      - method: GET
        path: /api/projects
        description: List all projects for the authenticated user, returning summary fields ordered by most recently updated
        auth_required: true
        request_schema: {}
        response_schema:
          "200": "Returns { projects: [{ id: string, name: string, specTitle: string | null, pathCount: number, createdAt: string, updatedAt: string }] }"
          "401": "Unauthorized - no valid session. Returns { error: 'Unauthorized' }"
          "500": "Internal server error. Returns { error: 'Internal server error' }"
      - method: POST
        path: /api/projects
        description: Create a new project by providing a name and OpenAPI spec content. Parses the spec to extract endpoints, auto-generates endpoint mappings with default MCP types, and creates a server config with defaults. All done in a Prisma transaction.
        auth_required: true
        request_schema:
          body:
            name: "string (required, validated by projectNameSchema via Zod)"
            specContent: "string (required, raw OpenAPI spec in JSON or YAML format)"
            specFormat: "string (optional, auto-detected from content if omitted)"
        response_schema:
          "201": "Project created. Returns { project: { id: string, name: string, pathCount: number } }"
          "400": "Validation error - invalid name, missing specContent, or unparseable OpenAPI spec. Returns { error: string }"
          "401": "Unauthorized. Returns { error: 'Unauthorized' }"
          "500": "Internal server error. Returns { error: 'Internal server error' }"
      - method: GET
        path: /api/projects/:id
        description: Get a single project with all endpoint mappings (ordered by path asc, method asc) and server config included
        auth_required: true
        request_schema: {}
        response_schema:
          "200": "Returns { project: { id, name, specContent, specFormat, specTitle, specVersion, pathCount, userId, createdAt, updatedAt, mappings: [...], config: {...} } }"
          "401": "Unauthorized. Returns { error: 'Unauthorized' }"
          "403": "Forbidden - project belongs to another user. Returns { error: 'Forbidden' }"
          "404": "Project not found. Returns { error: 'Project not found' }"
          "500": "Internal server error. Returns { error: 'Internal server error' }"
      - method: PATCH
        path: /api/projects/:id
        description: Update the name of an existing project. Validates new name with projectNameSchema. Updates the updatedAt timestamp.
        auth_required: true
        request_schema:
          body:
            name: "string (required, validated by projectNameSchema via Zod)"
        response_schema:
          "200": "Returns { project: { id: string, name: string, updatedAt: string } }"
          "400": "Invalid project name. Returns { error: string } with Zod validation message"
          "401": "Unauthorized. Returns { error: 'Unauthorized' }"
          "403": "Forbidden - project belongs to another user. Returns { error: 'Forbidden' }"
          "404": "Project not found. Returns { error: 'Project not found' }"
          "500": "Internal server error. Returns { error: 'Internal server error' }"
      - method: DELETE
        path: /api/projects/:id
        description: Delete a project and all associated data. Cascading delete removes all endpoint mappings, server config, and version snapshots.
        auth_required: true
        request_schema: {}
        response_schema:
          "200": "Returns { message: 'Project deleted' }"
          "401": "Unauthorized. Returns { error: 'Unauthorized' }"
          "403": "Forbidden - project belongs to another user. Returns { error: 'Forbidden' }"
          "404": "Project not found. Returns { error: 'Project not found' }"
          "500": "Internal server error. Returns { error: 'Internal server error' }"
    depends_on: []

  - name: Endpoint Mappings
    description: Manage MCP type assignments for API endpoint-to-tool mappings. Supports paginated listing with search/filter, single mapping update, and bulk update for multiple mappings. Each mapping ties an OpenAPI endpoint to an MCP type (tool, resource, resource_template, or exclude).
    files:
      - src/app/api/projects/[id]/mappings/route.ts
      - src/app/api/projects/[id]/mappings/[mappingId]/route.ts
      - src/app/api/projects/[id]/mappings/bulk/route.ts
    endpoints:
      - method: GET
        path: /api/projects/:id/mappings
        description: List endpoint mappings with optional search (path/operationId), method filter, mcpType filter, and pagination. Returns aggregate counts by mcpType for the summary bar (unfiltered).
        auth_required: true
        request_schema:
          query:
            search: "string (optional, filters by path or operationId containing value)"
            method: "string (optional, exact match on HTTP method e.g. GET, POST)"
            mcpType: "string (optional, exact match on tool/resource/resource_template/exclude)"
            page: "integer (optional, default 1, minimum 1)"
            limit: "integer (optional, default 20, minimum 1, maximum 100)"
        response_schema:
          "200": "Returns { mappings: [...], total: number, page: number, totalPages: number, toolCount: number, resourceCount: number, templateCount: number, excludeCount: number }"
          "401": "Unauthorized. Returns { error: 'Unauthorized' }"
          "403": "Forbidden. Returns { error: 'Forbidden' }"
          "404": "Project not found. Returns { error: 'Project not found' }"
          "500": "Internal server error. Returns { error: 'Internal server error' }"
      - method: PATCH
        path: /api/projects/:id/mappings/:mappingId
        description: Update the MCP type of a single endpoint mapping. Validates mcpType with Zod schema. Returns 400 if the type is already set to the requested value.
        auth_required: true
        request_schema:
          body:
            mcpType: "string (required, one of: tool, resource, resource_template, exclude - validated by mcpTypeSchema)"
        response_schema:
          "200": "Returns { mapping: { id, projectId, method, path, operationId, summary, description, paramsCount, hasBody, mcpType } }"
          "400": "Invalid MCP type or type already set to this value. Returns { error: string }"
          "401": "Unauthorized. Returns { error: 'Unauthorized' }"
          "403": "Forbidden. Returns { error: 'Forbidden' }"
          "404": "Project not found or mapping not found in this project. Returns { error: string }"
          "500": "Internal server error. Returns { error: 'Internal server error' }"
      - method: PATCH
        path: /api/projects/:id/mappings/bulk
        description: Bulk update the MCP type for multiple endpoint mappings at once. Only updates mappings that belong to the specified project.
        auth_required: true
        request_schema:
          body:
            mappingIds: "array of strings (required, non-empty array of mapping IDs)"
            mcpType: "string (required, one of: tool, resource, resource_template, exclude - validated by mcpTypeSchema)"
        response_schema:
          "200": "Returns { updated: number } with count of updated mappings"
          "400": "No mappings selected or invalid MCP type. Returns { error: string }"
          "401": "Unauthorized. Returns { error: 'Unauthorized' }"
          "403": "Forbidden. Returns { error: 'Forbidden' }"
          "404": "Project not found. Returns { error: 'Project not found' }"
          "500": "Internal server error. Returns { error: 'Internal server error' }"
    depends_on:
      - Projects CRUD

  - name: Server Config
    description: Read and update MCP server configuration for a project. Config includes transport type (stdio/SSE/streamable HTTP), authentication method, server name/version, base URL, and port number. Validated with Zod serverConfigSchema.
    files:
      - src/app/api/projects/[id]/config/route.ts
    endpoints:
      - method: GET
        path: /api/projects/:id/config
        description: Get the MCP server configuration for a project. Returns selected config fields only (transport, authMethod, serverName, serverVersion, baseUrl, port).
        auth_required: true
        request_schema: {}
        response_schema:
          "200": "Returns { config: { transport: string, authMethod: string, serverName: string, serverVersion: string, baseUrl: string, port: number } }"
          "401": "Unauthorized. Returns { error: 'Unauthorized' }"
          "403": "Access denied. Returns { error: 'Access denied' }"
          "404": "Project not found or config not found (two separate 404 cases). Returns { error: string }"
          "500": "Internal server error. Returns { error: 'Internal server error' }"
      - method: PUT
        path: /api/projects/:id/config
        description: Update the full MCP server configuration. All fields validated by serverConfigSchema (Zod). Returns field-level errors on validation failure.
        auth_required: true
        request_schema:
          body:
            transport: "string (required, validated by serverConfigSchema)"
            authMethod: "string (required, validated by serverConfigSchema)"
            serverName: "string (required, validated by serverConfigSchema)"
            serverVersion: "string (required, validated by serverConfigSchema)"
            baseUrl: "string (optional, defaults to empty string)"
            port: "integer (required, validated by serverConfigSchema)"
        response_schema:
          "200": "Returns { config: { transport, authMethod, serverName, serverVersion, baseUrl, port } }"
          "400": "Validation failed. Returns { error: 'Validation failed', fieldErrors: { [field]: string[] } }"
          "401": "Unauthorized. Returns { error: 'Unauthorized' }"
          "403": "Access denied. Returns { error: 'Access denied' }"
          "404": "Project not found. Returns { error: 'Project not found' }"
          "500": "Internal server error. Returns { error: 'Internal server error' }"
    depends_on:
      - Projects CRUD

  - name: Code Generation
    description: Generate MCP server source code files from project endpoint mappings and server config. Creates a versioned snapshot with auto-incrementing version number stored in the database. Uses the code-generator library to produce TypeScript server files.
    files:
      - src/app/api/projects/[id]/generate/route.ts
    endpoints:
      - method: POST
        path: /api/projects/:id/generate
        description: Generate MCP server code files from current mappings and config. Counts existing versions, creates a new ProjectVersion record with incremented version number, and stores the full config snapshot (mappings + config + files) as JSON.
        auth_required: true
        request_schema: {}
        response_schema:
          "200": "Returns { version: { id: string, versionNumber: number, createdAt: string }, files: { [filename]: string } }"
          "401": "Unauthorized. Returns { error: 'Unauthorized' }"
          "403": "Access denied. Returns { error: 'Access denied' }"
          "404": "Project not found or server config not found (two separate 404 cases). Returns { error: string }"
          "500": "Internal server error. Returns { error: 'Internal server error' }"
    depends_on:
      - Projects CRUD
      - Server Config
      - Endpoint Mappings

  - name: Download
    description: Generate and download a complete MCP server project as a zip archive. Regenerates code on-the-fly from current mappings and config, builds a zip using JSZip, and returns it as a binary response with proper Content-Disposition header.
    files:
      - src/app/api/projects/[id]/download/route.ts
    endpoints:
      - method: GET
        path: /api/projects/:id/download
        description: Generate MCP server code and return as a downloadable zip file. File name follows pattern mcpforge-[kebab-project-name].zip. Regenerates code fresh on each request rather than serving a cached version.
        auth_required: true
        request_schema: {}
        response_schema:
          "200": "Binary zip file with headers Content-Type: application/zip and Content-Disposition: attachment; filename=\"mcpforge-[name].zip\""
          "401": "Unauthorized. Returns JSON { error: 'Unauthorized' }"
          "403": "Access denied. Returns JSON { error: 'Access denied' }"
          "404": "Project not found or server config not found. Returns JSON { error: string }"
          "500": "Internal server error. Returns JSON { error: 'Internal server error' }"
    depends_on:
      - Projects CRUD
      - Server Config
      - Endpoint Mappings

  - name: Version History
    description: Retrieve all generated version snapshots for a project ordered by most recent first. Each version includes a version number, full config snapshot (JSON string with mappings, config, and files), and creation timestamp.
    files:
      - src/app/api/projects/[id]/versions/route.ts
    endpoints:
      - method: GET
        path: /api/projects/:id/versions
        description: List all version snapshots for a project, ordered by createdAt descending. Returns id, versionNumber, configSnapshot (JSON string), and createdAt for each version.
        auth_required: true
        request_schema: {}
        response_schema:
          "200": "Returns { versions: [{ id: string, versionNumber: number, configSnapshot: string, createdAt: string }] }"
          "401": "Unauthorized. Returns { error: 'Unauthorized' }"
          "403": "Access denied. Returns { error: 'Access denied' }"
          "404": "Project not found. Returns { error: 'Project not found' }"
          "500": "Internal server error. Returns { error: 'Internal server error' }"
    depends_on:
      - Projects CRUD

  - name: Fetch Spec Proxy
    description: Server-side proxy endpoint to fetch remote OpenAPI specification files by URL. Avoids browser CORS restrictions. Has a 10-second timeout via AbortController. No authentication required.
    files:
      - src/app/api/fetch-spec/route.ts
    endpoints:
      - method: POST
        path: /api/fetch-spec
        description: Fetch a remote OpenAPI specification from a given URL. Validates URL format (must be HTTP/HTTPS), fetches with 10-second abort timeout, and returns raw content as text.
        auth_required: false
        request_schema:
          body:
            url: "string (required, must be a valid HTTP or HTTPS URL)"
        response_schema:
          "200": "Returns { content: string } with the raw specification text"
          "400": "Missing URL, invalid URL format, or upstream fetch returned non-OK status. Returns { error: string } - error message includes upstream status code on fetch failure"
          "408": "Request timed out. Returns { error: 'Request timed out after 10 seconds' }"
          "500": "Unexpected fetch failure. Returns { error: 'Failed to fetch spec' }"
    depends_on: []

known_limitations:
  - issue: Fetch Spec Proxy has no authentication requirement, allowing unauthenticated server-side request forgery (SSRF)
    location: src/app/api/fetch-spec/route.ts
    impact: Any unauthenticated client can use the server as a proxy to fetch arbitrary HTTP/HTTPS URLs from the server's network
  - issue: Download endpoint regenerates code on every request instead of serving a cached or stored version
    location: src/app/api/projects/[id]/download/route.ts
    impact: Repeated downloads incur redundant code generation overhead; does not reuse the latest version snapshot
  - issue: No rate limiting on any API endpoints
    location: src/app/api/
    impact: All endpoints are vulnerable to abuse through excessive requests including brute-force on signup/signin
  - issue: Version number assignment uses count-based incrementing without atomicity guarantees
    location: src/app/api/projects/[id]/generate/route.ts
    impact: Two concurrent generate requests could read the same count and produce duplicate versionNumber values
  - issue: No email verification on signup
    location: src/app/api/auth/signup/route.ts
    impact: Any email address can be used to create an account without ownership verification
  - issue: SQLite database used as the datastore
    location: prisma/schema.prisma
    impact: Not suitable for multi-instance deployment or high-concurrency production workloads; limited to single-writer
  - issue: Bulk mapping update does not verify that all provided mappingIds actually exist
    location: src/app/api/projects/[id]/mappings/bulk/route.ts
    impact: Non-existent mapping IDs are silently ignored; the returned count may be less than the number of IDs provided with no indication of which ones failed
  - issue: Single mapping PATCH returns 400 when mcpType is already set to the requested value instead of a no-op 200
    location: src/app/api/projects/[id]/mappings/[mappingId]/route.ts
    impact: Clients must track current state to avoid unnecessary error handling for idempotent updates
